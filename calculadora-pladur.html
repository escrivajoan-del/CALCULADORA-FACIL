<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calculadora de Pladur Online | Cuántas placas necesito</title>

<meta name="description" content="Calculadora de pladur online gratis. Calcula cuántas placas de pladur necesitas según los metros cuadrados de tu proyecto.">

<style>
body{
font-family:Arial,sans-serif;
background:#f4f6f8;
margin:0;
padding:0;
color:#222;
}

header{
background:#0b5fff;
color:white;
padding:40px;
text-align:center;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
margin-top:20px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
margin-bottom:15px;
font-size:16px;
}

button{
background:#0b5fff;
color:white;
border:none;
padding:12px 20px;
font-size:16px;
border-radius:8px;
cursor:pointer;
}

#resultado{
margin-top:20px;
font-size:22px;
font-weight:bold;
color:#0b5fff;
}

footer{
text-align:center;
padding:30px;
margin-top:40px;
background:#111827;
color:white;
}
</style>
</head>

<body>

<header>
<h1>Calculadora de Pladur</h1>
<p>Calcula cuántas placas de pladur necesitas para tu proyecto.</p>
</header>

<div class="container">

<div class="card">

<label>Metros cuadrados a cubrir</label>

<input type="number" id="metros" placeholder="Ejemplo: 50">

<button onclick="calcularPladur()">Calcular</button>

<div id="resultado"></div>

</div>

<div class="card">

<h2>¿Cómo calcular placas de pladur?</h2>

<p>
Una placa estándar de pladur suele cubrir aproximadamente 3 m².
Esta calculadora añade un pequeño margen para cortes y desperdicios.
</p>

</div>

</div>

<footer>
© 2026 Calculadoras de Reformas y Hogar
</footer>

<script>
function calcularPladur(){

let metros=parseFloat(document.getElementById("metros").value);

if(isNaN(metros)){
document.getElementById("resultado").innerHTML="Introduce una superficie válida";
return;
}

let placas=Math.ceil((metros/3)*1.1);

document.getElementById("resultado").innerHTML=
"Necesitas aproximadamente "+placas+" placas de pladur";

}
</script>

</body>
</html>
